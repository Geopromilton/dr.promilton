<!doctype html>
<html lang="en" data-screen-label="C · Work">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Work & Research — Dr. Promilton</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Lora:ital,wght@0,400;0,500;0,600;1,500&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=3">
</head>
<body>
<div id="app"></div>
<script src="data.js"></script>
<script src="layout.js"></script>
<script>
(function () {
  const P = window.PROFILE; const L = window.C_LAYOUT;
  const html = `
    <div class="layout">
      ${L.sidebar('work.html')}
      <main class="main page-fade">
        <span class="kicker">Work & Research</span>
        <h1 class="h-display">${P.publications.length} publications · ${P.bookChapters.length} chapters · 3 roles.</h1>
        <p class="lead">Research output across hydrogeology, applied geophysics and geospatial modelling — plus consulting and teaching engagements.</p>

        <section class="section">
          <div class="section-title"><h2>Experience</h2></div>
          <div class="exp-list">
            ${P.experience.map(e => `
              <div class="exp-item reveal">
                <div class="exp-logo">${e.org.charAt(0)}</div>
                <div>
                  <div class="exp-head"><div><div class="exp-role">${e.role}</div><div class="exp-org">${e.org}</div><div class="exp-place">${e.place}</div></div><div class="exp-when">${e.from} — ${e.to}</div></div>
                  <p class="exp-detail">${e.detail}</p>
                  <span class="exp-pill">${e.type}</span>
                </div>
              </div>`).join('')}
          </div>
        </section>

        <section class="section">
          <div class="section-title"><h2>Publications</h2><span class="sub">${P.publications.length} peer-reviewed</span></div>
          <div class="pubs-controls" id="pubsCtrl">
            <button data-f="all" aria-pressed="true">All (${P.publications.length})</button>
            <button data-f="first">First-author</button>
            <button data-f="2026">2026</button>
            <button data-f="2025">2025</button>
            <button data-f="2024">2024</button>
            <button data-f="older">2022 & earlier</button>
          </div>
          <div class="pub-list" id="pubList">
            ${P.publications.map((p,i) => {
              const first = p.role === 'first author';
              return `
              <div class="pub-card reveal" data-yr="${p.year}" data-first="${first?'1':'0'}">
                <div class="yr">${p.year}</div>
                <div>
                  <div class="ttl">${p.title}${first?'<span class="star">★</span>':''}${first?'<span class="role">First author</span>':''}</div>
                  <div class="jrn">${p.journal}</div>
                </div>
                <div class="doi">${p.doi ? `<a href="https://doi.org/${p.doi}" target="_blank">${p.doi}</a>` : ''}</div>
              </div>`;
            }).join('')}
          </div>
        </section>

        <section class="section">
          <div class="section-title"><h2>Book chapters & conference proceedings</h2></div>
          <div class="pub-list">
            ${P.bookChapters.map(b => `<div class="pub-card"><div class="yr">${b.year}</div><div><div class="ttl">${b.title}</div><div class="jrn"></div></div><div class="doi"></div></div>`).join('')}
          </div>
        </section>

        <div class="contact-cta">
          <div><h3>Need a survey, review or model?</h3><p>I take on geophysical surveys, water-quality assessments, GIS modelling and peer reviews.</p></div>
          <div class="cta-buttons"><a class="btn btn-primary" href="contact.html">Start a conversation →</a><a class="btn btn-ghost" href="assets/Promilton_CV_2026.pdf" target="_blank">Download CV</a></div>
        </div>

        <div class="foot"><span>© 2026 · Dr. A. Antony Alosanai Promilton</span><span>Thoothukudi, Tamil Nadu</span></div>
      </main>
    </div>
    ${L.tweaksPanel()}
  `;
  document.getElementById('app').innerHTML = html;
  L.bindTweaks(); L.bindReveals();
  const ctrl = document.getElementById('pubsCtrl');
  ctrl.addEventListener('click', e => {
    const b = e.target.closest('button'); if (!b) return;
    ctrl.querySelectorAll('button').forEach(x => x.setAttribute('aria-pressed', x===b));
    const f = b.dataset.f;
    document.querySelectorAll('#pubList .pub-card').forEach(c => {
      const y = +c.dataset.yr; const first = c.dataset.first === '1';
      let show = true;
      if (f === 'first') show = first;
      else if (f === '2026') show = y === 2026;
      else if (f === '2025') show = y === 2025;
      else if (f === '2024') show = y === 2024;
      else if (f === 'older') show = y <= 2022;
      c.style.display = show ? '' : 'none';
    });
  });
})();
</script>
</body>
</html>
